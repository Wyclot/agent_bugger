<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeSight — AI Code Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7fff6e;
      --accent2: #5ee8ff;
      --danger: #ff5f5f;
      --text: #e8e8f0;
      --muted: #5a5a72;
      --card: #13131d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(127,255,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(127,255,110,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* Header */
    header {
      margin-bottom: 56px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-name span { color: var(--accent); }

    h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -2px;
      color: var(--text);
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.5px;
    }

    /* Input section */
    .input-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
    }

    .input-label {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    .url-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input::placeholder { color: var(--muted); }

    .url-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(127,255,110,0.08);
    }

    .btn-review {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .btn-review:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(127,255,110,0.3);
    }

    .btn-review:active:not(:disabled) { transform: translateY(0); }
    .btn-review:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status badge */
    .status-bar {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }

    .status-bar.visible { display: flex; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.pending { background: var(--muted); }
    .dot.running {
      background: var(--accent2);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot.done { background: var(--accent); }
    .dot.error { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Todos */
    .todos-section {
      display: none;
      margin-bottom: 32px;
    }

    .todos-section.visible { display: block; }

    .section-title {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      transition: border-color 0.2s;
    }

    .todo-item.completed { border-color: rgba(127,255,110,0.2); }
    .todo-item.in_process { border-color: rgba(94,232,255,0.2); }

    .todo-status-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .todo-content { flex: 1; color: var(--text); }

    .todo-badge {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .todo-badge.completed { background: rgba(127,255,110,0.1); color: var(--accent); }
    .todo-badge.in_process { background: rgba(94,232,255,0.1); color: var(--accent2); }
    .todo-badge.pending { background: rgba(90,90,114,0.2); color: var(--muted); }

    /* Result */
    .result-section {
      display: none;
    }

    .result-section.visible { display: block; }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .result-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
    }

    .btn-copy {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .btn-copy:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .result-body {
      padding: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 500px;
      overflow-y: auto;
    }

    .result-body::-webkit-scrollbar { width: 6px; }
    .result-body::-webkit-scrollbar-track { background: transparent; }
    .result-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .error-result {
      color: var(--danger);
    }

    /* Decorative line */
    .deco-line {
      width: 48px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">🔍</div>
      <div class="logo-name">Code<span>Sight</span></div>
    </div>
    <div class="deco-line"></div>
    <h1>AI-powered<br><em>code review</em></h1>
    <p class="subtitle">// paste a github url. get bugs found & fixed.</p>
  </header>

  <!-- Input -->
  <div class="input-section">
    <div class="input-label">GitHub Repository URL</div>
    <div class="input-row">
      <input
        type="text"
        class="url-input"
        id="urlInput"
        placeholder="https://github.com/user/repo"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-review" id="reviewBtn" onclick="startReview()">
        Run Review
      </button>
    </div>
    <div class="status-bar" id="statusBar">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Waiting...</span>
    </div>
  </div>

  <!-- Todos -->
  <div class="todos-section" id="todosSection">
    <div class="section-title">// task progress</div>
    <div class="todo-list" id="todoList"></div>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="section-title">// review output</div>
    <div class="result-card">
      <div class="result-header">
        <span class="result-title">AGENT OUTPUT</span>
        <button class="btn-copy" onclick="copyResult()">COPY</button>
      </div>
      <div class="result-body" id="resultBody"></div>
    </div>
  </div>

</div>

<script>
  const API_BASE = 'http://localhost:8000';
  let currentJobId = null;
  let eventSource = null;

  function setStatus(status, text) {
    const bar = document.getElementById('statusBar');
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    bar.classList.add('visible');
    dot.className = `dot ${status}`;
    statusText.textContent = text;
  }

  function renderTodos(todos) {
    if (!todos || todos.length === 0) return;
    const section = document.getElementById('todosSection');
    const list = document.getElementById('todoList');
    section.classList.add('visible');
    list.innerHTML = todos.map(todo => {
      const icons = { completed: '✅', in_process: '⚡', pending: '○' };
      const icon = icons[todo.status] || '○';
      return `
        <div class="todo-item ${todo.status}">
          <span class="todo-status-icon">${icon}</span>
          <span class="todo-content">${escHtml(todo.content)}</span>
          <span class="todo-badge ${todo.status}">${todo.status.replace('_', ' ')}</span>
        </div>
      `;
    }).join('');
  }

  function showResult(text, isError = false) {
    const section = document.getElementById('resultSection');
    const body = document.getElementById('resultBody');
    section.classList.add('visible');
    body.className = 'result-body' + (isError ? ' error-result' : '');
    body.textContent = text;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function startReview() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;

    // Reset UI
    document.getElementById('todosSection').classList.remove('visible');
    document.getElementById('resultSection').classList.remove('visible');
    document.getElementById('todoList').innerHTML = '';
    document.getElementById('reviewBtn').disabled = true;

    if (eventSource) { eventSource.close(); eventSource = null; }

    setStatus('running', 'Starting review agent...');

    try {
      const res = await fetch(`${API_BASE}/review`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ github_url: url })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      currentJobId = data.job_id;

      // Open SSE stream
      eventSource = new EventSource(`${API_BASE}/review/${currentJobId}/stream`);

      eventSource.onmessage = (e) => {
        const payload = JSON.parse(e.data);

        if (payload.error) {
          setStatus('error', 'Error: ' + payload.error);
          eventSource.close();
          document.getElementById('reviewBtn').disabled = false;
          return;
        }

        const statusMessages = {
          pending: 'Job queued...',
          running: 'Agent working — cloning, reviewing, fixing...',
          done: 'Review complete ✓',
          error: 'Something went wrong'
        };

        setStatus(payload.status, statusMessages[payload.status] || payload.status);

        if (payload.todos && payload.todos.length > 0) {
          renderTodos(payload.todos);
        }

        if (payload.status === 'done') {
          showResult(payload.result || 'No output returned.');
          eventSource.close();
          document.getElementById('reviewBtn').disabled = false;
        } else if (payload.status === 'error') {
          showResult(payload.result || 'Unknown error.', true);
          eventSource.close();
          document.getElementById('reviewBtn').disabled = false;
        }
      };

      eventSource.onerror = () => {
        setStatus('error', 'Connection lost');
        eventSource.close();
        document.getElementById('reviewBtn').disabled = false;
      };

    } catch (err) {
      setStatus('error', 'Failed to connect: ' + err.message);
      document.getElementById('reviewBtn').disabled = false;
    }
  }

  function copyResult() {
    const text = document.getElementById('resultBody').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'COPIED!';
      setTimeout(() => btn.textContent = 'COPY', 1500);
    });
  }

  // Enter key support
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startReview();
    });
  });
</script>
</body>
</html>
